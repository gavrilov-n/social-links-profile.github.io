<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  <article class="card card-formatting">
    <img src="assets/images/avatar-jessica.jpeg" alt="avatar of jessica"  class="avatar">
    <div class="title">
      <h1>Jessica Randall</h1>
      <h2>London, United Kingdom</h2>
    </div>
    <p>"Front-end developer and avid reader."</p>
    <div class="buttons">
      <button class="button">GitHub</button>
      <button class="button">Frontend Mentor</button>
      <button class="button">LinkedIn</button>
      <button class="button">Twitter</button>
      <button class="button">Instagram</button>
    </div>
  </article>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/gavrilov-n">Nikita Gavrilov</a>.
  </footer>
</body>
</html>
